<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS To-Do List</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <div class="todo-container"><!--the task list container where the whole thing is kept jen-->

    <h1>To-Do List</h1>

    <div class="input-section">
      <input type="text" id="task-input" placeholder="Add a new task..." /> <!--Input user field -->
      <button id="add-task-btn">Add Task</button> <!--create the add button-->
    </div>
    <ul id="task-list"></ul>
  </div>
  <script src="./js/index.js"></script>
</body>
</html>
