<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To Do list</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
<div id="garden-background"></div>
  <div class="todo-container">

    <h1>To-Do List</h1>

    <div class="input-section">
      <input type="text" id="task-input" placeholder="What shall I do next?" /> 
      <button id="add-task-btn">Add Task !</button> 
    </div>
    <ul id="task-list"></ul>
    <div class="todo-footer">
    <button id="show-all" aria-pressed="false">All</button>
    <button id="show-active"aria-pressed="false">Active</button>
    <button id="show-completed"aria-pressed="false">Completed</button>
    <!--<button id="show-deleted"aria-pressed="false">Deleted</button>-->
    
  </div>

<button id="start-game">🎮 Start Game</button>
<div id="game-container"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <script src="./js/index.js"></script>
  <script src="./js/garden.js"></script>
</body>
</html>
