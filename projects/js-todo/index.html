<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To Do list</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <div class="todo-container">

    <h1>To-Do List</h1>

    <div class="input-section">
      <input type="text" id="task-input" placeholder="What shall I do next?" /> 
      <button id="add-task-btn">Add Task !</button> 
    </div>
    <ul id="task-list"></ul>
    <div class="todo-footer">
    <button id="show-all">All</button>
    <button id="show-active">Active</button>
    <button id="show-completed">Completed</button>
    <!--<button id="show-deleted">Deleted</button>-->
  </div>
  <script src="./js/index.js"></script>
</body>
</html>
